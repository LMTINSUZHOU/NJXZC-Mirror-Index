<!DOCTYPE html>
<html lang="zh-Hans-CN">
  <head>
    <title>NX OpenAtom Status</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/svg+xml" href="/static/img/favicon.svg" />
    <style>
      body {
        margin: 0;
        color: #1f2933;
        background: #fbfcfe;
        font-family: "Open Sans", "Segoe UI", "Noto Sans CJK SC", sans-serif;
      }
      #nav {
        display: flex;
        gap: 24px;
        align-items: center;
        padding: 18px 24px;
        background: #113b5a;
      }
      #nav a {
        color: #e9f2f6;
        text-decoration: none;
      }
      main {
        width: min(1180px, calc(100% - 32px));
        margin: 28px auto 48px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 30px;
        font-weight: 500;
      }
      .summary {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 12px;
        margin: 22px 0;
      }
      .metric {
        border: 1px solid #dbe5ea;
        background: #fff;
        padding: 14px 16px;
      }
      .metric strong {
        display: block;
        font-size: 26px;
        font-weight: 500;
        color: #165b7a;
      }
      .metric span {
        color: #697986;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        background: #fff;
      }
      th,
      td {
        padding: 9px 10px;
        border-bottom: 1px solid #e6edf1;
        line-height: 1.35;
        text-align: left;
      }
      th {
        background: #eef4f6;
        font-weight: 600;
        color: #2f4858;
      }
      tbody tr:hover {
        background: #f3f8fa;
      }
      .failedSync {
        background-color: #fff4e3;
      }
      .ongoingSync {
        background-color: #e4f5fb;
      }
      .muted {
        color: #71808c;
      }
      .error {
        color: #a33b19;
      }
      .table-wrap {
        overflow-x: auto;
        border: 1px solid #dbe5ea;
      }
      .withComment {
        position: relative;
        display: inline-block;
      }
      .withComment .comment {
        visibility: hidden;
        min-width: 160px;
        background-color: #1f2933;
        color: #fff;
        text-align: center;
        padding: 6px 8px;
        position: absolute;
        z-index: 1;
        top: -8px;
        left: 105%;
      }
      .withComment:hover .comment {
        visibility: visible;
      }
      @media screen and (max-width: 760px) {
        #nav {
          flex-wrap: wrap;
          gap: 12px;
        }
        .summary {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }
    </style>
    <script src="/static/js/tablesort.js"></script>
    <script src="/static/js/tablesort.filesize.js"></script>
  </head>
  <body>
    <nav id="nav">
      <a href="/">Mirrors Index</a>
      <a href="#sync">Sync Status</a>
      <a href="https://help.mirrors.cernet.edu.cn/" target="_blank">Help</a>
    </nav>
    <main>
      <h1>同步状态</h1>
      <p class="muted">数据来自本机 yuki 服务公开接口 <code>/api/v1/metas</code>。</p>

      <section class="summary" aria-label="同步概览">
        <div class="metric"><strong id="totalCount">0</strong><span>仓库总数</span></div>
        <div class="metric"><strong id="syncingCount">0</strong><span>同步中</span></div>
        <div class="metric"><strong id="failedCount">0</strong><span>异常</span></div>
        <div class="metric"><strong id="totalSize">Unknown</strong><span>已统计容量</span></div>
      </section>

      <section id="sync" class="table-wrap">
        <table id="status">
          <thead>
            <tr>
              <th>Archive name</th>
              <th>Last success</th>
              <th>Last status</th>
              <th>Last sync</th>
              <th>Next sync</th>
              <th>Upstream</th>
              <th>Size</th>
              <th>Syncing</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </section>
      <p id="loadError" class="error"></p>
    </main>
    <script>
      function fileSizeToReadable(bytes) {
        if (!Number.isFinite(bytes) || bytes < 0) return "Unknown";
        var exp = Math.floor(Math.log(bytes || 1) / Math.log(1024));
        var result = (bytes / Math.pow(1024, exp)).toFixed(2);
        return result + " " + (exp === 0 ? "bytes" : "KMGTPEZY"[exp - 1] + "B");
      }

      function genError(code) {
        var errorInfos = {
          5: "Server reached max connections",
          10: "Error in socket I/O",
          11: "Error in socket I/O",
          12: "Error in rsync protocol data stream",
          23: "Partial transfer due to error",
          24: "Partial transfer due to vanished source files",
          25: "The --max-delete limit stopped deletions",
          30: "Timeout in data send/receive",
          137: "The syncing container was terminated by SIGKILL signal",
          143: "The syncing container was terminated by SIGTERM signal",
          "-2": "The syncing container timed out and was terminated"
        };
        if (code === 0) return "OK";
        var errorInfo = code;
        if (errorInfos[code]) {
          errorInfo += '<span class="comment">' + errorInfos[code] + "</span>";
        }
        return "Failed (" + errorInfo + ")";
      }

      function formatDateTime(timestamp) {
        if (!timestamp || timestamp < 0) return "";
        var date = new Date(timestamp * 1000);
        return date.toLocaleString("zh-CN", { hour12: false });
      }

      function setText(id, text) {
        document.getElementById(id).textContent = text;
      }

      var tbody = document.getElementById("status").getElementsByTagName("tbody")[0];
      fetch("/status/json")
        .then(function(response) {
          if (!response.ok) throw new Error("HTTP " + response.status);
          return response.json();
        })
        .then(function(data) {
          var syncing = 0;
          var failed = 0;
          var totalSize = 0;
          var hasSize = false;

          data.forEach(function(e) {
            var row = document.createElement("tr");
            var size = Number(e.size);
            if (Number.isFinite(size) && size >= 0) {
              totalSize += size;
              hasSize = true;
            }
            if (e.syncing === true) syncing += 1;
            if (e.exitCode !== 0 && e.exitCode !== 25) failed += 1;

            row.innerHTML =
              "<td>" + e.name + "</td>" +
              "<td>" + formatDateTime(e.lastSuccess) + "</td>" +
              '<td class="withComment">' + genError(e.exitCode) + "</td>" +
              "<td>" + formatDateTime(e.prevRun) + "</td>" +
              "<td>" + formatDateTime(e.nextRun) + "</td>" +
              "<td>" + (e.upstream || "") + "</td>" +
              '<td data-sort="' + String(size).padStart(100, "0") + '">' + fileSizeToReadable(size) + "</td>" +
              "<td>" + (e.syncing === true ? "Running" : "Idle") + "</td>";
            if (e.exitCode !== 0 && e.exitCode !== 25) row.classList.add("failedSync");
            if (e.syncing === true) row.classList.add("ongoingSync");
            tbody.appendChild(row);
          });

          setText("totalCount", String(data.length));
          setText("syncingCount", String(syncing));
          setText("failedCount", String(failed));
          setText("totalSize", hasSize ? fileSizeToReadable(totalSize) : "Unknown");
          new Tablesort(document.getElementById("status"));
        })
        .catch(function(error) {
          document.getElementById("loadError").textContent = "加载同步状态失败：" + error.message;
        });
    </script>
  </body>
</html>
